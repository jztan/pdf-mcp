name: Dependency Review

on:
  pull_request:
    branches:
      - master
      - develop
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - 'requirements*.txt'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Audit for known vulnerabilities
        # CVE-2026-4539: pygments (dev-only transitive dep via pytest/rich, not shipped)
        # CVE-2026-3219: pip itself (build-time only; not a runtime dep of pdf-mcp)
        # No fix available yet — ignore until upstream patches are released
        run: pip-audit --ignore-vuln CVE-2026-4539 --ignore-vuln CVE-2026-3219
