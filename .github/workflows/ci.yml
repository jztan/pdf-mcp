name: CI

on:
  pull_request:
    branches:
      - main
      - develop

  push:
    branches:
      - develop
      - feature/*
      - release/*
      - hotfix/*

  workflow_dispatch:  # allows manual run from GitHub UI

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
      fail-fast: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen --extra dev
      - name: Audit dependencies for known vulnerabilities
        # CVE-2026-4539: pygments (dev-only transitive dep via pytest/rich, not shipped)
        # CVE-2026-3219: pip itself (build-time only; not a runtime dep of pdf-mcp)
        # No fix available yet — ignore until upstream patches are released
        run: uv run pip-audit --ignore-vuln CVE-2026-4539 --ignore-vuln CVE-2026-3219
      - name: Run linter
        run: uv run flake8 src/
      - name: Check formatting
        run: uv run black --check src/
      - name: Run type checker
        run: uv run mypy src/
      - name: Run tests
        run: uv run pytest tests/ -v
